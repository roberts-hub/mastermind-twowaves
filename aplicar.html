<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APLICAR — MASTERMIND Two Waves Films</title>
  <meta name="description" content="Aplicación al mastermind de Two Waves Films. 20 lugares." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/estilo.css" />
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230e0e0d"/><path d="M31 34h28.5v6.2H49v26.5h-7.7V40.2H31z" fill="%23e7e2d6"/><circle cx="69.5" cy="37" r="4" fill="%23e7e2d6"/></svg>' />
</head>
<body class="pagina-aplicar">

  <div class="grain" aria-hidden="true"></div>

  <main class="aplicar">
    <a class="volver reveal visto" href="index.html">← VOLVER</a>

    <svg class="isotipo reveal visto" viewBox="0 0 100 100" fill="none" aria-label="Two Waves">
      <path d="M31 34h28.5v6.2H49v26.5h-7.7V40.2H31z" fill="currentColor"/>
      <circle cx="69.5" cy="37" r="4" fill="currentColor"/>
    </svg>

    <p class="etiqueta centrada reveal visto">( APLICACIÓN — MASTERMIND )</p>
    <h1 class="titulo centrado reveal visto">20 LUGARES.</h1>
    <p class="aplicar-intro reveal visto">
      Sin precio publicado. Revisamos cada aplicación
      y te contactamos para una llamada.
    </p>

    <form id="form-aplicar" class="form reveal visto" novalidate>
      <div class="campo">
        <label for="nombre">NOMBRE COMPLETO</label>
        <input type="text" id="nombre" name="nombre" required autocomplete="name" />
      </div>
      <div class="campo">
        <label for="correo">CORREO</label>
        <input type="email" id="correo" name="correo" required autocomplete="email" />
      </div>
      <div class="campo">
        <label for="whatsapp">WHATSAPP</label>
        <input type="tel" id="whatsapp" name="whatsapp" required autocomplete="tel" />
      </div>
      <div class="campo">
        <label for="instagram">INSTAGRAM / PORTAFOLIO</label>
        <input type="text" id="instagram" name="instagram" required />
      </div>
      <div class="campo">
        <label for="negocio">¿DÓNDE ESTÁ TU NEGOCIO HOY Y A DÓNDE QUIERES LLEVARLO?</label>
        <textarea id="negocio" name="negocio" rows="4" required></textarea>
      </div>

      <button type="submit" class="btn-linea grande">ENVIAR APLICACIÓN <span class="flecha">→</span></button>
      <p class="nota" id="form-estado" role="status"></p>
    </form>

    <div id="form-exito" class="exito" hidden>
      <svg class="destello" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
        <path d="M50 8 C51.5 34 52 42 66 50 C52 58 51.5 66 50 92 C48.5 66 48 58 34 50 C48 42 48.5 34 50 8 Z"/>
      </svg>
      <h2 class="titulo centrado">RECIBIDO.</h2>
      <p class="aplicar-intro">Tu aplicación está en la lista. Si haces sentido para el cuarto, te llega una llamada.</p>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-firma">TWO WAVES FILMS — GUADALAJARA, MX — EST. 2021</p>
  </footer>

  <script src="js/form.js"></script>
</body>
</html>
